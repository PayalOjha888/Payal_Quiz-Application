services:
  mysqldb:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=QuizApp
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 5s
      timeout: 5s
      retries: 10

  quiz-app:
    build: .
    ports:
      - "8091:8091"
    environment:
      - DB_HOST=mysqldb  # This matches the service name above
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      mysqldb:
        condition: service_healthy

volumes:
  db_data: