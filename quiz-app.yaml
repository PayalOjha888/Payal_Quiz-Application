apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiz-app
  template:
    metadata:
      labels:
        app: quiz-app
    spec:
      containers:
        - name: quiz-app
          image: your-dockerhub-username/quiz-app:v1 # The image you pushed in Step 5
          ports:
            - containerPort: 8091
          env:
            - name: DB_HOST
              value: mysqldb
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-pass
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-app-service
spec:
  type: NodePort
  selector:
    app: quiz-app
  ports:
    - port: 8091
      targetPort: 8091
      nodePort: 30001 # You can pick any port between 30000-32767