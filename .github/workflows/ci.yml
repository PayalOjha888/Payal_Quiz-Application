name: Java CI with Maven and Docker
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # This mimics your 'mysqldb' service from docker-compose
      mysqldb:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: QuizApp
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn -B package --file pom.xml
        env:
          # These allow the Spring Boot app to connect to the service above
          DB_HOST: localhost
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/QuizApp
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root

      # Optional: This step verifies your Dockerfile can build successfully
      - name: Build Docker Image
        run: docker build -t quiz-app:latest .